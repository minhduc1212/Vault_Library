{% extends "base.html" %}

{% block title %}Vault Library — MangaDex Series{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/series.css') }}">
{% endblock %}

{% block content %}
<!-- ╔══════════════════════════════════════════════
     TOPBAR
══════════════════════════════════════════════╗ -->
<nav class="topbar" aria-label="Site navigation">
  <div class="topbar__inner">
    <a class="topbar__back" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to your Vault
    </a>
    <a class="topbar__brand" href="/">Vault Library</a>
  </div>
</nav>

<!-- ╔══════════════════════════════════════════════
     HERO
══════════════════════════════════════════════╗ -->
<div class="hero-wrap">
  <div class="hero-bg" id="hero-bg" aria-hidden="true"></div>

  <div class="hero-content">
    <!-- Cover -->
    <div class="hero-cover" id="cover-wrap" aria-hidden="true">
      <div class="sk" style="position:absolute;inset:0;border-radius:6px;"></div>
    </div>

    <!-- Info -->
    <div class="hero-info">
      <p class="hero-eyebrow" aria-hidden="true">MangaDex Series</p>
      <h1 class="hero-title" id="title">Loading…</h1>
      <p id="description" style="margin-top: 10px; color: var(--text-dim); font-size: 0.9em; max-height: 100px; overflow-y: auto;"></p>

      <!-- Stats row -->
      <div class="stats-row" id="stats-row" aria-label="Series info">
        <!-- filled by JS -->
      </div>

      <!-- CTA -->
      <a class="btn-read" id="btn-read" href="#">
        Read from Ch.1
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>
</div>

<!-- ╔══════════════════════════════════════════════
     CHAPTER LIST
══════════════════════════════════════════════╗ -->
<div class="section-header">
  <h2>Chapters</h2>
  <span class="chapter-count-tag" id="ch-count"></span>
</div>

<div class="chapter-grid" id="grid" role="list" aria-label="Chapter list">
  <!-- skeletons -->
</div>
{% endblock %}

{% block extra_js %}
<script>
    const mangaId = "{{ manga_id }}";
</script>
<script src="{{ url_for('static', filename='js/mangadex_series.js') }}"></script>
{% endblock %}
