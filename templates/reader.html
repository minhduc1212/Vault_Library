{% extends "base.html" %}

{% block title %}PANELS — Reader{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/reader.css') }}">
{% endblock %}

{% block content %}
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="cursor"></div>

<!-- TOP HUD -->
<div id="hud">
  <div class="hud-left">
    <a class="hud-back" id="hud-back-link" href="/">← Back</a>
    <span class="hud-sep">/</span>
    <a id="hud-title" class="hud-series-link" href="/">Series</a>
  </div>
  <span id="hud-chapter">Loading…</span>
  <span id="hud-counter">— / —</span>
  <button class="hud-btn" id="prev-btn" title="Previous page (←)">←</button>
  <button class="hud-btn" id="next-btn" title="Next page (→)">→</button>
  
  <div class="ch-nav-wrap">
    <button class="hud-btn ch-btn" id="prev-ch-btn" title="Previous chapter">«</button>
    <button class="hud-btn ch-btn" id="ch-list-btn" title="Chapter List" onclick="toggleChList()" style="display:none;">≡</button>
    <button class="hud-btn ch-btn" id="next-ch-btn" title="Next chapter">»</button>

    <!-- CHAPTER LIST DROPDOWN -->
    <div id="ch-list-modal" class="nav-modal">
      <div class="ch-modal-content">
        <div class="ch-modal-header">
          <h3>Chapters</h3>
        </div>
        <div class="ch-modal-body" id="ch-list-items"></div>
      </div>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-page" onclick="setMode('page')">PAGE</button>
    <button class="mode-btn" id="btn-scroll" onclick="setMode('scroll')">SCROLL</button>
  </div>

  <!-- EPUB SETTINGS -->
  <div id="epub-settings" style="display:none; margin-left: 10px; gap: 8px; align-items: center;">
    <div class="ch-nav-wrap">
      <button class="hud-btn" id="font-list-btn" title="Font Settings" onclick="toggleFontList()" style="width: auto; border-radius: 4px; padding: 0 8px; font-size: 11px; font-family: 'Syne Mono', monospace;">Aa</button>
      
      <!-- FONT LIST DROPDOWN -->
      <div id="font-list-modal" class="nav-modal">
        <div class="ch-modal-content" style="width: 180px;">
          <div class="ch-modal-header">
            <h3>Typography</h3>
          </div>
          <div class="ch-modal-body">
            <div class="ch-item font-option active" onclick="selectFont('\'Syne\', sans-serif', this)" style="font-family: 'Syne', sans-serif;">Sans-serif</div>
            <div class="ch-item font-option" onclick="selectFont('\'Georgia\', serif', this)" style="font-family: 'Georgia', serif;">Serif</div>
            <div class="ch-item font-option" onclick="selectFont('\'Syne Mono\', monospace', this)" style="font-family: 'Syne Mono', monospace;">Mono</div>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:4px; border:1.5px solid var(--border); border-radius:4px; padding: 2px 6px;">
      <button onclick="changeFontSize(-1)" class="mode-btn" style="padding: 2px 8px;">A-</button>
      <span id="font-size-val" style="font-family: 'Syne Mono', monospace; font-size: 11px; min-width: 20px; text-align: center;">18</span>
      <button onclick="changeFontSize(1)" class="mode-btn" style="padding: 2px 8px;">A+</button>
    </div>
    <input type="color" id="text-color" value="#FFFFFF" onchange="updateEpubStyle()" style="width: 24px; height: 24px; padding: 0; border: 1.5px solid var(--border); border-radius: 4px; background: none; cursor: pointer;">
  </div>
</div>

<!-- CANVAS -->
<div id="canvas">
  <div id="page-wrap">
    <img class="comic-page loading" id="main-img" src="" alt=""/>
    <div id="zone-prev"></div>
    <div id="zone-next"></div>
  </div>
  <div id="scroll-wrap"></div>
  <div id="epub-content" style="display:none;"></div>
</div>

<!-- BOTTOM HUD -->
<div id="bottom-hud">
  <button class="nav-btn" id="prev-btn2" title="←">‹</button>
  <div id="thumb-strip"></div>
  <button class="nav-btn" id="next-btn2" title="→">›</button>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
<script>
    const dirIndex = {{ dir_index }};
    const readPath = "{{ read_path }}";
</script>
<script src="{{ url_for('static', filename='js/reader.js') }}"></script>
{% endblock %}
