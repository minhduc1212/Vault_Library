<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PANELS — Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0D0C0C;--surface:#161514;--ink:#F0EBE1;
    --red:#E8281C;--muted:#5A5752;--border:#272522;
    --progress:0%;
  }
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;display:flex;flex-direction:column;}

  /* ── PROGRESS BAR ────────────────────────────────────────── */
  #progress-bar{
    position:fixed;top:0;left:0;right:0;height:2px;z-index:200;
    background:var(--border);
  }
  #progress-fill{
    height:100%;background:var(--red);
    width:var(--progress);transition:width .3s ease;
  }

  /* ── TOP HUD ─────────────────────────────────────────────── */
  #hud{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;gap:12px;
    padding:0 20px;height:52px;
    background:linear-gradient(to bottom,rgba(13,12,12,.95),transparent);
    transition:opacity .3s;
  }
  #hud.hidden{opacity:0;pointer-events:none;}

  .hud-back{
    display:flex;align-items:center;gap:6px;
    text-decoration:none;color:var(--ink);
    font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:.05em;
    opacity:.7;transition:opacity .15s;
  }
  .hud-back:hover{opacity:1;}

  #hud-title{
    font-size:13px;font-weight:700;letter-spacing:-.2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    flex:1;
  }
  #hud-counter{
    font-family:'Syne Mono',monospace;font-size:11px;
    color:var(--muted);white-space:nowrap;
  }

  .hud-btn{
    width:32px;height:32px;border-radius:50%;
    border:1.5px solid var(--border);background:var(--surface);
    color:var(--ink);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;flex-shrink:0;
  }
  .hud-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--bg);}
  .hud-btn:disabled{opacity:.25;cursor:default;}

  /* ── VIEW MODE TOGGLE ────────────────────────────────────── */
  .mode-toggle{
    display:flex;border:1.5px solid var(--border);border-radius:100px;overflow:hidden;
  }
  .mode-btn{
    padding:5px 12px;font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.05em;
    background:transparent;color:var(--muted);border:none;cursor:pointer;transition:all .15s;
  }
  .mode-btn.active{background:var(--ink);color:var(--bg);}

  /* ── CANVAS / SCROLL AREA ────────────────────────────────── */
  #canvas{
    flex:1;overflow:hidden;position:relative;
    display:flex;align-items:center;justify-content:center;
    cursor:none;
  }
  #canvas.scroll-mode{overflow-y:auto;overflow-x:hidden;align-items:flex-start;}

  /* ── SINGLE PAGE MODE ────────────────────────────────────── */
  #page-wrap{
    display:flex;align-items:center;justify-content:center;
    width:100%;height:100%;position:relative;
  }
  #page-wrap.scroll-mode{display:none;}

  .comic-page{
    max-height:calc(100vh - 52px);max-width:100%;
    object-fit:contain;display:block;
    transition:opacity .18s ease;
    user-select:none;-webkit-user-drag:none;
  }
  .comic-page.loading{opacity:0;}

  /* ── SCROLL MODE ─────────────────────────────────────────── */
  #scroll-wrap{
    display:none;width:100%;
    padding:60px 0 100px;
    align-items:center;flex-direction:column;gap:3px;
  }
  #scroll-wrap.active{display:flex;}

  .scroll-page{
    max-width:min(800px,100%);width:100%;
    display:block;
    opacity:0;transform:translateY(12px);
    transition:opacity .4s ease,transform .4s ease;
  }
  .scroll-page.visible{opacity:1;transform:none;}

  /* ── CURSOR NAV ZONES ────────────────────────────────────── */
  #zone-prev,#zone-next{
    position:absolute;top:0;bottom:0;width:40%;z-index:10;
  }
  #zone-prev{left:0;}
  #zone-next{right:0;}

  /* custom cursor */
  #cursor{
    position:fixed;pointer-events:none;z-index:999;
    width:44px;height:44px;border-radius:50%;
    border:1.5px solid rgba(240,235,225,.4);
    transition:transform .12s ease,opacity .15s;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;transform:translate(-50%,-50%);
  }
  #cursor.prev::before{content:'←';}
  #cursor.next::before{content:'→';}
  #cursor.default{opacity:0;}

  /* ── BOTTOM HUD ──────────────────────────────────────────── */
  #bottom-hud{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    padding:20px;
    background:linear-gradient(to top,rgba(13,12,12,.9) 60%,transparent);
    display:flex;align-items:center;justify-content:center;gap:16px;
    transition:opacity .3s;
  }
  #bottom-hud.hidden{opacity:0;pointer-events:none;}

  .nav-btn{
    width:48px;height:48px;border-radius:50%;
    border:1.5px solid var(--border);
    background:var(--surface);color:var(--ink);
    font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
  }
  .nav-btn:hover{border-color:var(--red);color:var(--red);}
  .nav-btn:disabled{opacity:.2;cursor:default;}

  #thumb-strip{
    display:flex;align-items:center;gap:4px;
    height:48px;overflow:hidden;
  }
  .thumb{
    height:40px;width:28px;border-radius:2px;overflow:hidden;
    border:1.5px solid transparent;background:var(--border);
    cursor:pointer;transition:all .15s;flex-shrink:0;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb.active{border-color:var(--red);transform:scale(1.15);}
  .thumb:not(.active):hover{border-color:var(--muted);}

  /* ── KEYBOARD HINT ───────────────────────────────────────── */
  #key-hint{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    font-family:'Syne Mono',monospace;font-size:10px;color:var(--muted);
    letter-spacing:.08em;opacity:1;transition:opacity 1s;
    pointer-events:none;
  }
  #key-hint.gone{opacity:0;}
</style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="cursor"></div>

<!-- TOP HUD -->
<div id="hud">
  <a class="hud-back" id="hud-back-link" href="/">← Back</a>
  <span id="hud-title">Loading…</span>
  <span id="hud-counter">— / —</span>
  <button class="hud-btn" id="prev-btn" title="Previous (←)">←</button>
  <button class="hud-btn" id="next-btn" title="Next (→)">→</button>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-page" onclick="setMode('page')">PAGE</button>
    <button class="mode-btn" id="btn-scroll" onclick="setMode('scroll')">SCROLL</button>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas">
  <div id="page-wrap">
    <img class="comic-page loading" id="main-img" src="" alt=""/>
    <div id="zone-prev"></div>
    <div id="zone-next"></div>
  </div>
  <div id="scroll-wrap"></div>
</div>

<!-- BOTTOM HUD -->
<div id="bottom-hud">
  <button class="nav-btn" id="prev-btn2" title="←">‹</button>
  <div id="thumb-strip"></div>
  <button class="nav-btn" id="next-btn2" title="→">›</button>
</div>

<div id="key-hint">← → ARROW KEYS &nbsp;|&nbsp; SPACE TO ADVANCE</div>

<script>
const dirIndex = {{ dir_index }};
const readPath = "{{ read_path }}";
const parts = readPath.split('/');
const title = decodeURIComponent(parts[parts.length - 1]);

// Figure out whether this is a chapter-based read (series) or a one-shot
const isChapter = parts.length > 1;
const seriesName = isChapter ? parts[0] : null;

let pages = [];
let current = 0;
let mode = 'page';
let hudTimer;

// ── INIT ────────────────────────────────────────────────────
document.getElementById('hud-title').textContent = title;

async function init() {
  const res = await fetch(`/api/pages/${dirIndex}/${readPath}`);
  pages = await res.json();
  if (!pages.length) {
    document.getElementById('hud-title').textContent = 'No pages found';
    return;
  }
  buildThumbs();
  goTo(0);
  preload(1);
  setTimeout(() => document.getElementById('key-hint').classList.add('gone'), 3500);
}

// ── NAVIGATION ──────────────────────────────────────────────
function goTo(idx) {
  if (idx < 0 || idx >= pages.length) return;
  current = idx;
  updateHud();
  if (mode === 'page') loadPage(idx);
  updateThumbs();
  preload(idx + 1);
}

function loadPage(idx) {
  const img = document.getElementById('main-img');
  img.classList.add('loading');
  const src = pages[idx];
  const tmp = new Image();
  tmp.onload = () => {
    img.src = src;
    img.classList.remove('loading');
  };
  tmp.src = src;
}

function preload(idx) {
  if (idx < pages.length) { const p = new Image(); p.src = pages[idx]; }
  if (idx + 1 < pages.length) { const p = new Image(); p.src = pages[idx + 1]; }
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

// ── HUD ─────────────────────────────────────────────────────
function updateHud() {
  document.getElementById('hud-counter').textContent =
    `${current + 1} / ${pages.length}`;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === pages.length - 1;
  document.getElementById('prev-btn2').disabled = current === 0;
  document.getElementById('next-btn2').disabled = current === pages.length - 1;

  const pct = pages.length > 1 ? (current / (pages.length - 1)) * 100 : 100;
  document.documentElement.style.setProperty('--progress', pct + '%');

  showHud();
}

function showHud() {
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('bottom-hud').classList.remove('hidden');
  clearTimeout(hudTimer);
  if (mode === 'page') {
    hudTimer = setTimeout(() => {
      document.getElementById('hud').classList.add('hidden');
      document.getElementById('bottom-hud').classList.add('hidden');
    }, 2800);
  }
}

// ── THUMBNAILS ───────────────────────────────────────────────
function buildThumbs() {
  const strip = document.getElementById('thumb-strip');
  strip.innerHTML = pages.slice(0, 20).map((src, i) =>
    `<div class="thumb" onclick="goTo(${i})">
       <img src="${src}" loading="lazy" alt="p${i+1}"/>
     </div>`
  ).join('');
}

function updateThumbs() {
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === current);
  });
  // scroll active into view
  const active = document.querySelector('.thumb.active');
  if (active) active.scrollIntoView({ block:'nearest', inline:'center', behavior:'smooth' });
}

// ── SCROLL MODE ──────────────────────────────────────────────
function buildScrollMode() {
  const wrap = document.getElementById('scroll-wrap');
  wrap.innerHTML = pages.map((src, i) =>
    `<img class="scroll-page" src="${src}" alt="page ${i+1}" loading="lazy"/>`
  ).join('');
  // Intersection observer for fade-in
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.scroll-page').forEach(el => obs.observe(el));

  // Update page counter while scrolling
  const pages_els = document.querySelectorAll('.scroll-page');
  const obs2 = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = [...pages_els].indexOf(e.target);
        if (idx >= 0) { current = idx; updateHud(); }
      }
    });
  }, { threshold: 0.5 });
  pages_els.forEach(el => obs2.observe(el));
}

// ── MODE SWITCHING ───────────────────────────────────────────
function setMode(m) {
  mode = m;
  const pageWrap   = document.getElementById('page-wrap');
  const scrollWrap = document.getElementById('scroll-wrap');
  const canvas     = document.getElementById('canvas');

  document.getElementById('btn-page').classList.toggle('active', m === 'page');
  document.getElementById('btn-scroll').classList.toggle('active', m === 'scroll');

  if (m === 'page') {
    pageWrap.classList.remove('scroll-mode');
    scrollWrap.classList.remove('active');
    canvas.classList.remove('scroll-mode');
    loadPage(current);
    showHud();
  } else {
    pageWrap.classList.add('scroll-mode');
    scrollWrap.classList.add('active');
    canvas.classList.add('scroll-mode');
    if (!scrollWrap.children.length) buildScrollMode();
    // scroll to current page
    setTimeout(() => {
      const el = scrollWrap.querySelectorAll('.scroll-page')[current];
      if (el) el.scrollIntoView({ behavior:'smooth' });
    }, 100);
    // keep HUD visible in scroll mode
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('bottom-hud').classList.remove('hidden');
  }
}

// ── EVENTS ───────────────────────────────────────────────────
document.getElementById('prev-btn').onclick  = prev;
document.getElementById('next-btn').onclick  = next;
document.getElementById('prev-btn2').onclick = prev;
document.getElementById('next-btn2').onclick = next;

document.getElementById('zone-prev').onclick = prev;
document.getElementById('zone-next').onclick = next;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); if (mode==='page') next(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { e.preventDefault(); if (mode==='page') prev(); }
});

// custom cursor
const cursor = document.getElementById('cursor');
const zonePrev = document.getElementById('zone-prev');
const zoneNext = document.getElementById('zone-next');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (el === zonePrev || zonePrev.contains(el)) {
    cursor.className = 'prev';
  } else if (el === zoneNext || zoneNext.contains(el)) {
    cursor.className = 'next';
  } else {
    cursor.className = 'default';
  }
  showHud();
});
document.addEventListener('mouseleave', () => cursor.className = 'default');

// touch swipe
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40 && mode === 'page') {
    if (dx < 0) next(); else prev();
  }
});

init();
</script>
</body>
</html>
