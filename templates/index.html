<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vault Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
<style>

/* ─────────────────────────────────────────────────────────
   RESET & TOKENS
───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* palette */
  --bg       : #EEEAE0;   /* page background              */
  --surface  : #F5F2EB;   /* card / input surfaces        */
  --ink      : #111010;   /* primary text                 */
  --ink-2    : #3A3834;   /* secondary text               */
  --muted    : #6B6560;   /* ≥4.7:1 on --bg  ✓ WCAG AA   */
  --red      : #D62B1F;   /* accent                       */
  --border   : #C8C2B6;   /* lines                        */
  --border-lt: #DDDAD2;   /* lighter lines                */

  /* layout */
  --max : 1160px;
  --gx  : 48px;           /* horizontal page padding      */
  --r   : 5px;            /* border-radius                */

  /* rhythm — every spacing is a multiple of 8 px */
  --s1  : 8px;
  --s2  : 16px;
  --s3  : 24px;
  --s4  : 32px;
  --s5  : 40px;
  --s6  : 48px;
  --s8  : 64px;
}

html  { scroll-behavior: smooth; }
body  {
  background : var(--bg);
  color      : var(--ink);
  font-family: 'Syne', sans-serif;
  min-height : 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────────────────────────────────────────────────
   UTILITY
───────────────────────────────────────────────────────── */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ─────────────────────────────────────────────────────────
   LAYOUT SHELL
───────────────────────────────────────────────────────── */
.l-page {
  max-width : var(--max);
  margin    : 0 auto;
  padding   : 0 var(--gx);
}

/* ─────────────────────────────────────────────────────────
   HEADER  — lean, just brand + nav
───────────────────────────────────────────────────────── */
.site-header {
  position   : sticky;
  top        : 0;
  z-index    : 200;
  background : var(--bg);
  border-bottom: 1px solid var(--border);
}
.site-header__inner {
  max-width  : var(--max);
  margin     : 0 auto;
  padding    : 0 var(--gx);
  height     : 48px;
  display    : flex;
  align-items: center;
  justify-content: space-between;
}
.site-header__logo {
  font-size     : 11px;
  font-weight   : 800;
  letter-spacing: .2em;
  text-transform: uppercase;
  text-decoration: none;
  color         : var(--ink);
}
.site-header__tag {
  font-family   : 'Syne Mono', monospace;
  font-size     : 10px;
  color         : var(--muted);
  letter-spacing: .06em;
}

/* settings button */
.site-header__settings {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer;
  transition: all .15s;
  margin-left: 6px;
}
.site-header__settings:hover { border-color: var(--ink); color: var(--ink); }
.site-header__settings svg { display: block; }

/* ─────────────────────────────────────────────────────────
   HERO  — balanced two-column block
───────────────────────────────────────────────────────── */
.hero {
  padding       : var(--s6) 0 var(--s5);
  display       : grid;
  grid-template-columns: 1fr auto;
  align-items   : center;          /* vertically centred, not bottom-hanging */
  column-gap    : var(--s6);
  border-bottom : 1px solid var(--border);
}

/* left: eyebrow + heading */
.hero__label {
  font-family   : 'Syne Mono', monospace;
  font-size     : 9px;
  letter-spacing: .24em;
  text-transform: uppercase;
  color         : var(--red);
  margin-bottom : var(--s1);
  display       : flex;
  align-items   : center;
  gap           : 8px;
}
.hero__label::before {
  content   : '';
  display   : inline-block;
  width     : 18px;
  height    : 1px;
  background: var(--red);
  flex-shrink: 0;
}
.hero__heading {
  font-size    : clamp(26px, 2.8vw, 38px);
  font-weight  : 800;
  line-height  : 1.1;
  letter-spacing: -1px;
}
.hero__heading em { font-style: normal; color: var(--red); }

/* right: stat box — bordered so it reads as a unit, not a float */
.hero__stat {
  display         : flex;
  flex-direction  : column;
  align-items     : center;
  justify-content : center;
  gap             : 2px;
  padding         : var(--s3) var(--s4);
  border          : 1px solid var(--border);
  border-radius   : var(--r);
  background      : var(--surface);
  min-width       : 110px;
  text-align      : center;
}
.hero__stat-num {
  font-size          : clamp(40px, 4.5vw, 60px);
  font-weight        : 800;
  line-height        : 1;
  letter-spacing     : -2px;
  font-variant-numeric: tabular-nums;
  color              : var(--border);            /* placeholder colour */
  transition         : color .5s ease;
}
.hero__stat-num.is-loaded { color: var(--ink); }
.hero__stat-label {
  font-family   : 'Syne Mono', monospace;
  font-size     : 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color         : var(--muted);
}

/* ─────────────────────────────────────────────────────────
   TOOLBAR  — filters + conditional count
───────────────────────────────────────────────────────── */
.toolbar {
  padding    : var(--s3) 0 var(--s3);
  display    : flex;
  align-items: center;
  gap        : var(--s1);
}
.toolbar__spacer { flex: 1; }

.chip {
  border        : 1px solid var(--border);
  background    : transparent;
  font-family   : 'Syne Mono', monospace;
  font-size     : 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding       : 6px 16px;
  border-radius : 100px;
  cursor        : pointer;
  color         : var(--muted);
  line-height   : 1;
  transition    : color .14s, border-color .14s, background .14s;
}
.chip:hover   { border-color: var(--ink); color: var(--ink); }
.chip:focus-visible {
  outline: 2px solid var(--red);
  outline-offset: 2px;
}
.chip.is-active {
  background  : var(--ink);
  color       : var(--bg);
  border-color: var(--ink);
}

.toolbar__count {
  font-family   : 'Syne Mono', monospace;
  font-size     : 10px;
  color         : var(--muted);
  letter-spacing: .06em;
  visibility    : hidden;   /* shown only when filtered */
}
.toolbar__count.is-visible { visibility: visible; }

/* ─────────────────────────────────────────────────────────
   GRID
───────────────────────────────────────────────────────── */
.library-grid {
  display              : grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap                  : var(--s4) var(--s3);
  padding-bottom       : var(--s8);
}

/* ─────────────────────────────────────────────────────────
   CARD
───────────────────────────────────────────────────────── */
.card {
  display        : flex;
  flex-direction : column;
  text-decoration: none;
  color          : inherit;
  cursor         : pointer;
}

/* Cover image container — strict 2:3 with overflow hard-clipped */
.card__cover {
  position     : relative;
  width        : 100%;
  aspect-ratio : 2 / 3;
  overflow     : hidden;         /* THE hard clip — nothing escapes */
  border-radius: var(--r);
  background   : var(--border-lt);
  transition   : transform .28s cubic-bezier(.22,.61,.36,1),
                 box-shadow .28s cubic-bezier(.22,.61,.36,1);
}
.card:hover .card__cover {
  transform : translateY(-4px);
  box-shadow: 0 16px 36px rgba(17,16,16,.15),
              0 4px  10px rgba(17,16,16,.07);
}

/* Image — fills the container absolutely so aspect-ratio is king */
.card__cover img {
  position  : absolute;
  inset     : 0;
  width     : 100%;
  height    : 100%;
  object-fit: cover;
  display   : block;
  transition: transform .5s cubic-bezier(.25,.46,.45,.94);
}
.card:hover .card__cover img { transform: scale(1.04); }

.card__cover .no-cover {
  position   : absolute;
  inset      : 0;
  display    : flex;
  align-items: center;
  justify-content: center;
  font-size  : 42px;
  opacity    : .1;
}

/* Badge — top-left, inside the image frame */
.card__badge {
  position      : absolute;
  top           : 8px;
  left          : 8px;
  z-index       : 2;
  font-family   : 'Syne Mono', monospace;
  font-size     : 8px;
  letter-spacing: .13em;
  text-transform: uppercase;
  line-height   : 1;
  padding       : 4px 7px;
  border-radius : 3px;
  background    : rgba(17,16,16,.65);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color         : #fff;
}
.card__badge--series { background: rgba(214,43,31,.8); }

/* Text block — consistent padding, proper gap */
.card__body {
  padding   : 10px 2px 0;
  display   : flex;
  flex-direction: column;
  gap       : 4px;
}
.card__title {
  font-size    : 13px;
  font-weight  : 700;
  line-height  : 1.3;
  letter-spacing: -.1px;
  color        : var(--ink-2);
  /* truncate to 2 lines */
  display             : -webkit-box;
  -webkit-line-clamp  : 2;
  -webkit-box-orient  : vertical;
  overflow            : hidden;
  transition          : color .14s;
}
.card:hover .card__title { color: var(--red); }
.card__meta {
  font-family   : 'Syne Mono', monospace;
  font-size     : 10px;
  color         : var(--muted);
  letter-spacing: .04em;
}

/* ─────────────────────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────────────────────── */
.empty-state {
  grid-column: 1 / -1;
  padding    : var(--s8) 0;
  text-align : center;
}
.empty-state__icon { font-size: 36px; opacity: .18; margin-bottom: var(--s2); }
.empty-state__heading {
  font-size  : 17px;
  font-weight: 800;
  margin-bottom: var(--s1);
}
.empty-state__body {
  font-family   : 'Syne Mono', monospace;
  font-size     : 10px;
  color         : var(--muted);
  line-height   : 2.4;
  letter-spacing: .04em;
}
.empty-state__body code {
  background   : var(--border-lt);
  padding      : 1px 6px;
  border-radius: 3px;
  font-size    : 10px;
}

/* ─────────────────────────────────────────────────────────
   SKELETON LOADERS
───────────────────────────────────────────────────────── */
@keyframes shimmer {
  from { background-position: -700px 0; }
  to   { background-position:  700px 0; }
}
.sk-pulse {
  background     : linear-gradient(
    90deg,
    var(--border-lt) 25%,
    var(--bg)        50%,
    var(--border-lt) 75%
  );
  background-size: 1400px;
  animation      : shimmer 1.6s infinite linear;
}
.sk-cover {
  width        : 100%;
  aspect-ratio : 2 / 3;
  border-radius: var(--r);
}
.sk-body { padding: 10px 2px 0; display: flex; flex-direction: column; gap: 6px; }
.sk-line { height: 11px; border-radius: 3px; }
.sk-line--md  { width: 65%; }
.sk-line--sm  { width: 38%; }

/* ─────────────────────────────────────────────────────────
   FOOTER  — clean, no count
───────────────────────────────────────────────────────── */
.site-footer {
  border-top: 1px solid var(--border);
}
.site-footer__inner {
  max-width  : var(--max);
  margin     : 0 auto;
  padding    : var(--s2) var(--gx);
  display    : flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Syne Mono', monospace;
  font-size  : 10px;
  color      : var(--muted);
  letter-spacing: .08em;
}

/* ─────────────────────────────────────────────────────────
   MODAL
───────────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(17,16,16,.35);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity .22s ease, visibility .22s;
}
.modal-backdrop.open { opacity: 1; visibility: visible; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--s4);
  max-width: 440px; width: 90%;
  display: flex; flex-direction: column; gap: var(--s3);
  transform: translateY(8px);
  transition: transform .22s ease;
}
.modal-backdrop.open .modal { transform: translateY(0); }

.modal__title {
  font-size: 15px; font-weight: 800; letter-spacing: -.3px;
  display: flex; align-items: center; gap: var(--s1);
}
.modal__desc {
  font-family: 'Syne Mono', monospace; font-size: 10px;
  color: var(--muted); letter-spacing: .04em; line-height: 1.7;
}
.modal__input {
  width: 100%; padding: 10px 14px;
  font-family: 'Syne Mono', monospace; font-size: 11px;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--bg); color: var(--ink);
  letter-spacing: .04em; outline: none;
  transition: border-color .15s;
}
.modal__input:focus { border-color: var(--ink); }
.modal__error {
  font-family: 'Syne Mono', monospace; font-size: 10px;
  color: var(--red); letter-spacing: .04em; display: none;
}
.modal__actions {
  display: flex; gap: var(--s1); justify-content: flex-end; margin-top: 4px;
}
.modal__btn {
  padding: 8px 20px; border-radius: 100px;
  font-family: 'Syne Mono', monospace; font-size: 10px;
  letter-spacing: .08em; text-transform: uppercase;
  cursor: pointer; transition: all .15s;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
}
.modal__btn:hover { border-color: var(--ink); color: var(--ink); }
.modal__btn--primary {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.modal__btn--primary:hover { background: var(--red); border-color: var(--red); color: #fff; }

/* ─────────────────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────────────────── */
@media (max-width: 680px) {
  :root { --gx: 20px; }

  .hero {
    grid-template-columns: 1fr;
    row-gap: var(--s3);
  }
  .hero__stat {
    flex-direction: row;
    align-items   : baseline;
    gap           : var(--s1);
    padding       : var(--s2) var(--s3);
    width         : fit-content;
  }
  .hero__stat-num   { font-size: 32px; }
  .hero__stat-label { font-size: 9px; }

  .library-grid {
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: var(--s3) var(--s2);
  }
}

</style>
</head>
<body>

<!-- ╔══════════════════════════════════════════════
     HEADER
═══════════════════════════════════════════════╗ -->
<header class="site-header">
  <div class="site-header__inner">
    <a class="site-header__logo" href="/">Vault Library</a>
    <span class="site-header__tag">Comic Reader</span>
    <a class="site-header__settings" href="/setup" aria-label="Manage comics folders" title="Comics folder settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </a>
  </div>
</header>

<!-- ╔══════════════════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════════════════╗ -->
<main>
  <div class="l-page">

    <!-- HERO -->
    <section class="hero" aria-labelledby="hero-heading">
      <div class="hero__left">
        <p class="hero__label" aria-hidden="true">Duc's collection</p>
        <h1 class="hero__heading" id="hero-heading">
          Welcome to<br>my Lib<em>r</em>ary
        </h1>
      </div>

      <div class="hero__stat" aria-label="Total titles in library">
        <span class="hero__stat-num" id="stat-count" aria-live="polite">—</span>
        <span class="hero__stat-label">Titles</span>
      </div>
    </section>

    <!-- TOOLBAR -->
    <div class="toolbar" role="toolbar" aria-label="Filter library">
      <button class="chip is-active" data-filter="all"     aria-pressed="true" >All</button>
      <button class="chip"           data-filter="oneshot" aria-pressed="false">One-shots</button>
      <button class="chip"           data-filter="series"  aria-pressed="false">Series</button>
      <span class="toolbar__spacer"></span>
      <span class="toolbar__count" id="filter-count" aria-live="polite"></span>
    </div>

    <!-- GRID -->
    <div class="library-grid" id="grid" role="list" aria-label="Comics"></div>

  </div><!-- /.l-page -->
</main>

<!-- ╔══════════════════════════════════════════════
     FOOTER
═══════════════════════════════════════════════╗ -->
<footer class="site-footer">
  <div class="site-footer__inner">
    <span>Vault Library</span>
    <span>Personal Comic Reader</span>
  </div>
</footer>


<!-- ╔══════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════╗ -->
<script>
'use strict';

/* ── SKELETON ────────────────────────────────── */
const grid = document.getElementById('grid');

(function renderSkeletons() {
  grid.innerHTML = Array(12).fill(0).map(() => `
    <div role="listitem" aria-hidden="true">
      <div class="sk-cover sk-pulse"></div>
      <div class="sk-body">
        <div class="sk-line sk-line--md sk-pulse"></div>
        <div class="sk-line sk-line--sm sk-pulse"></div>
      </div>
    </div>`).join('');
})();

/* ── STATE ───────────────────────────────────── */
let allComics   = [];
let activeFilter = 'all';

/* ── LOAD ────────────────────────────────────── */
async function loadLibrary() {
  try {
    const res  = await fetch('/api/library');
    allComics  = await res.json();
  } catch (e) {
    allComics  = [];
  }

  /* update hero stat — single source of truth */
  const countEl = document.getElementById('stat-count');
  countEl.textContent = allComics.length;
  countEl.classList.add('is-loaded');

  render();
}

/* ── RENDER ──────────────────────────────────── */
function render() {
  const list   = activeFilter === 'all'
    ? allComics
    : allComics.filter(c => c.type === activeFilter);

  const shown  = list.length;
  const total  = allComics.length;

  /* filter count: only visible when a filter reduces the set */
  const countEl = document.getElementById('filter-count');
  if (activeFilter !== 'all') {
    countEl.textContent = `${shown} of ${total}`;
    countEl.classList.add('is-visible');
  } else {
    countEl.textContent = '';
    countEl.classList.remove('is-visible');
  }

  /* empty state */
  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state" role="listitem">
        <div class="empty-state__icon">📂</div>
        <h2 class="empty-state__heading">Nothing here yet.</h2>
        <p class="empty-state__body">
          One-shot → <code>comics/my-comic/</code> (images inside)<br>
          Series &nbsp;→ <code>comics/my-series/Ch.1/</code> (chapters)
        </p>
      </div>`;
    return;
  }

  /* cards */
  grid.innerHTML = list.map(c => {
    const href  = c.type === 'series'
      ? `/series/${c.dir_index}/${encodeURIComponent(c.name)}`
      : `/read/${c.dir_index}/${encodeURIComponent(c.name)}`;

    const meta   = c.type === 'series'
      ? `${c.chapters} ch.`
      : `${c.pages} pg.`;

    const badgeClass = c.type === 'series'
      ? 'card__badge card__badge--series'
      : 'card__badge';
    const badgeLabel = c.type === 'series' ? 'Series' : 'One-shot';

    // Backend now provides a full 'cover' URL. Use it directly.
    const cover = c.cover
      ? `<img src="${c.cover}" alt="" loading="lazy"/>`
      : `<div class="no-cover" aria-hidden="true">📖</div>`;

    return `
      <article class="card" role="listitem">
        <a href="${href}" aria-label="${escHtml(c.name)} — ${badgeLabel}, ${meta}">
          <div class="card__cover">
            ${cover}
            <span class="${badgeClass}" aria-hidden="true">${badgeLabel}</span>
          </div>
          <div class="card__body">
            <div class="card__title">${escHtml(c.name)}</div>
            <div class="card__meta">${meta}</div>
          </div>
        </a>
      </article>`;
  }).join('');

  /* stagger-reveal */
  grid.querySelectorAll('.card').forEach((el, i) => {
    el.style.opacity   = '0';
    el.style.transform = 'translateY(8px)';
    el.style.transition = `opacity .24s ease ${i * 20}ms, transform .24s ease ${i * 20}ms`;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.opacity   = '1';
      el.style.transform = 'none';
    }));
  });
}

/* ── FILTER CHIPS ────────────────────────────── */
document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(b => {
      b.classList.remove('is-active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('is-active');
    btn.setAttribute('aria-pressed', 'true');
    activeFilter = btn.dataset.filter;
    render();
  });
});

/* ── UTIL ────────────────────────────────────── */
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
loadLibrary();
</script>
</body>
</html>
