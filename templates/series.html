<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PANELS — Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F0EBE1;--ink:#111010;--paper:#FAFAF7;
    --red:#E8281C;--muted:#9E9890;--border:#D5CFC4;--gap:24px;
  }
  body{background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;min-height:100vh;}

  header{
    position:sticky;top:0;z-index:100;
    display:flex;align-items:center;gap:16px;
    padding:0 var(--gap);height:56px;
    background:var(--bg);border-bottom:1.5px solid var(--ink);
  }
  .back{
    display:flex;align-items:center;gap:8px;
    text-decoration:none;color:var(--ink);
    font-family:'Syne Mono',monospace;font-size:12px;letter-spacing:.05em;
    padding:6px 12px;border:1.5px solid var(--border);border-radius:100px;
    transition:all .15s;
  }
  .back:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
  .logo{font-size:18px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--ink);margin-left:auto;}

  .series-hero{
    padding:56px var(--gap) 40px;
    border-bottom:1.5px solid var(--border);
    display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:end;
  }
  .series-cover{
    width:120px;aspect-ratio:2/3;overflow:hidden;
    border:1.5px solid var(--ink);background:var(--border);
    flex-shrink:0;
  }
  .series-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .series-info{}
  .series-eyebrow{
    font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:.15em;
    text-transform:uppercase;color:var(--red);margin-bottom:10px;
  }
  .series-title{
    font-size:clamp(28px,5vw,56px);font-weight:800;
    letter-spacing:-2px;line-height:.95;margin-bottom:16px;
  }
  .series-stats{
    display:flex;gap:24px;
    font-family:'Syne Mono',monospace;font-size:11px;color:var(--muted);
  }
  .stat strong{display:block;color:var(--ink);font-size:20px;font-weight:700;font-family:'Syne',sans-serif;}

  .chapter-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px var(--gap);
    border-bottom:1.5px solid var(--border);
  }
  .chapter-header h2{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
  .read-all{
    font-family:'Syne Mono',monospace;font-size:11px;
    padding:6px 14px;border:1.5px solid var(--ink);
    text-decoration:none;color:var(--ink);border-radius:100px;
    transition:all .15s;
  }
  .read-all:hover{background:var(--red);color:#fff;border-color:var(--red);}

  .chapter-list{border-bottom:1.5px solid var(--border);}
  .chapter-item{
    display:flex;align-items:center;gap:20px;
    padding:20px var(--gap);
    border-bottom:1.5px solid var(--border);
    text-decoration:none;color:inherit;
    background:var(--paper);
    transition:background .12s;
    position:relative;overflow:hidden;
  }
  .chapter-item:last-child{border-bottom:none;}
  .chapter-item::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--red);transform:scaleY(0);transform-origin:bottom;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  }
  .chapter-item:hover{background:var(--ink);}
  .chapter-item:hover::before{transform:scaleY(1);}

  .ch-num{
    font-size:clamp(28px,4vw,42px);font-weight:800;
    letter-spacing:-2px;color:var(--border);line-height:1;
    flex-shrink:0;width:70px;text-align:right;
    transition:color .12s;
  }
  .chapter-item:hover .ch-num{color:#333;}

  .ch-thumb{
    width:44px;height:60px;overflow:hidden;flex-shrink:0;
    background:var(--border);border:1px solid var(--border);
  }
  .ch-thumb img{width:100%;height:100%;object-fit:cover;display:block;}

  .ch-info{flex:1;}
  .ch-name{font-size:15px;font-weight:700;margin-bottom:4px;transition:color .12s;}
  .chapter-item:hover .ch-name{color:var(--bg);}
  .ch-meta{
    font-family:'Syne Mono',monospace;font-size:10px;
    color:var(--muted);letter-spacing:.06em;text-transform:uppercase;
  }
  .chapter-item:hover .ch-meta{color:#666;}

  .ch-arrow{
    font-size:20px;color:var(--border);transition:all .2s;flex-shrink:0;
  }
  .chapter-item:hover .ch-arrow{color:var(--red);transform:translateX(4px);}
</style>
</head>
<body>
<header>
  <a class="back" href="/">← Back</a>
  <a class="logo" href="/">PANELS</a>
</header>

<div class="series-hero" id="hero">
  <div class="series-cover" id="cover-wrap">
    <div style="width:100%;height:100%;background:var(--border);"></div>
  </div>
  <div class="series-info">
    <div class="series-eyebrow">Series</div>
    <h1 class="series-title" id="title">Loading…</h1>
    <div class="series-stats" id="stats"></div>
  </div>
</div>

<div class="chapter-header">
  <h2>Chapters</h2>
  <a class="read-all" id="read-all" href="#">Read from Ch.1 →</a>
</div>

<div class="chapter-list" id="list"></div>

<script>
const dirIndex = {{ dir_index }};
const seriesPath = "{{ series_path }}";
const seriesName = seriesPath.split('/').pop();

document.getElementById('title').textContent = decodeURIComponent(seriesName);

async function load() {
  const res = await fetch(`/api/chapters/${dirIndex}/${seriesPath}`);
  const chapters = await res.json();

  if (chapters.length) {
    // cover from first chapter
    const wrap = document.getElementById('cover-wrap');
    if (chapters[0].cover) {
      wrap.innerHTML = `<img src="${chapters[0].cover}" alt=""/>`;
    }
    document.getElementById('read-all').href =
      `/read/${dirIndex}/${encodeURIComponent(seriesPath)}/${encodeURIComponent(chapters[0].name)}`;
  }

  const totalPages = chapters.reduce((s, c) => s + c.pages, 0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${chapters.length}</strong>Chapters</div>
    <div class="stat"><strong>${totalPages}</strong>Total pages</div>
  `;

  document.getElementById('list').innerHTML = chapters.map((ch, i) => `
    <a class="chapter-item" href="/read/${dirIndex}/${encodeURIComponent(seriesPath)}/${encodeURIComponent(ch.name)}">
      <span class="ch-num">${String(i+1).padStart(2,'0')}</span>
      <div class="ch-thumb">
        ${ch.cover ? `<img src="${ch.cover}" alt=""/>` : ''}
      </div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-meta">${ch.pages} pages</div>
      </div>
      <span class="ch-arrow">→</span>
    </a>
  `).join('');
}

load();
</script>
</body>
</html>
